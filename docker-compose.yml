version: '3.8'

name: iot-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: iot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iot_platform}
      POSTGRES_USER: ${POSTGRES_USER:-iotadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iotpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iotadmin} -d ${POSTGRES_DB:-iot_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: iot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network
    restart: unless-stopped

  # NOTE: No MQTT broker is bundled. This platform connects to an EXTERNAL
  # MQTT broker configured via MQTT_* environment variables (see .env.example).

  nats:
    image: nats:2.10-alpine
    container_name: iot-nats
    ports:
      - "4222:4222"
      - "6222:6222"
      - "8222:8222"
    command: "-js -sd /data"
    volumes:
      - nats_data:/data
    networks:
      - iot-network
    restart: unless-stopped

  # NOTE: Object storage is provided by Cloudflare R2 (see R2_* env vars).
  # No local MinIO/S3 service is deployed.

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: iot-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - iot-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  grafana:
    image: grafana/grafana:11.2.0
    container_name: iot-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    networks:
      - iot-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  loki:
    image: grafana/loki:3.1.0
    container_name: iot-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - iot-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-iotadmin}:${DB_PASSWORD:-iotpassword}@postgres:5432/${POSTGRES_DB:-iot_platform}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES: ${JWT_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      NATS_URL: nats://nats:4222
      # External MQTT broker (bring your own)
      MQTT_HOST: ${MQTT_HOST:?MQTT_HOST is required}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_PROTOCOL: ${MQTT_PROTOCOL:-mqtt}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-iot-platform-backend}
      MQTT_TLS_ENABLED: ${MQTT_TLS_ENABLED:-false}
      # Cloudflare R2 firmware storage
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      OTA_SIGNED_URL_EXPIRY: ${OTA_SIGNED_URL_EXPIRY:-3600}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iot-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iot-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    depends_on:
      - backend
    networks:
      - iot-network
    restart: unless-stopped

networks:
  iot-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nats_data:
  prometheus_data:
  grafana_data:
  loki_data:
