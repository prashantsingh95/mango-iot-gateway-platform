apiVersion: v2
name: iot-platform
description: Industrial IoT Gateway Management Platform
version: 1.0.0
appVersion: 1.0.0
type: application

dependencies:
  - name: postgresql
    version: ~15.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: ~19.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: emqx
    version: ~5.0
    repository: https://repos.emqx.io/charts
    condition: emqx.enabled
