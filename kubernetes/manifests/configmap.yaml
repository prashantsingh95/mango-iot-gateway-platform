apiVersion: v1
kind: ConfigMap
metadata:
  name: iot-backend-config
  namespace: iot-platform
data:
  NODE_ENV: "production"
  PORT: "3001"
  DATABASE_URL: "postgresql://iotadmin:iotpassword@iot-postgres:5432/iot_platform?schema=public"
  REDIS_HOST: "iot-redis-master"
  REDIS_PORT: "6379"
  MQTT_BROKER_URL: "mqtt://iot-emqx:1883"
  NATS_URL: "nats://iot-nats:4222"
  S3_ENDPOINT: "http://iot-minio:9000"
  S3_BUCKET: "iot-firmware"
  METRICS_ENABLED: "true"
